        function calculateGains(period) { 
            if (!currentUser) return 0; 
            const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); 
            let sd; switch(period) { case 'today': sd = today; break; case 'yesterday': sd = new Date(today); sd.setDate(sd.getDate()-1); break; case 'month': sd = new Date(now.getFullYear(), now.getMonth(), 1); break; case '2years': sd = new Date(now.getFullYear()-2, now.getMonth(), now.getDate()); break; default: return 0; } 
            const ed = period === 'yesterday' ? today : now; let tot = 0; 
            ['depositHistory','vipEarningsHistory','taskHistory','commissionHistory'].forEach(h => { if (currentUser[h]) currentUser[h].forEach(it => { if (it.date) { const d = new Date(it.date); if (d >= sd && d <= ed) tot += (it.amount||0); } }); });

            return tot;

        async function verificarEColetarPremio() {
            if (!currentUser?.phone) return;
            const claimedRewards = currentUser.claimedReferralRewards || [];
            let currentReward = null;
            for (const reward of referralRewards) { if (!claimedRewards.includes(reward.level)) { currentReward = reward; break; } }
            if (!currentReward) { alert('🎉 PARABÉNS! Completou TODOS os níveis!'); return; }
            const depositsSnap = await db.ref('depositos').once('value');
            const allDeposits = depositsSnap.exists() ? depositsSnap.val() : {};
            const approvedPhones = [...new Set(Object.values(allDeposits).filter(d=>d?.status==='approved').map(d=>d.userPhone||d.phone).filter(Boolean))];
            const user = await getUser(currentUser.phone);
            const usedReferrals = user.usedReferrals || [];
            let count = 0;
            for (const refPhone of user.invitedUsers||[]) { if (!usedReferrals.includes(refPhone) && approvedPhones.includes(refPhone)) count++; }
            if (count >= currentReward.required) {
                currentUser.balance = (currentUser.balance||0)+currentReward.reward;
                if (!currentUser.claimedReferralRewards) currentUser.claimedReferralRewards = [];
                currentUser.claimedReferralRewards.push(currentReward.level);
                const newUsed = [...usedReferrals]; let usedCount = 0;
                for (const refPhone of user.invitedUsers||[]) { if (!newUsed.includes(refPhone) && approvedPhones.includes(refPhone) && usedCount<currentReward.required) { newUsed.push(refPhone); usedCount++; } }
                currentUser.usedReferrals = newUsed;
                if (!currentUser.rewardHistory) currentUser.rewardHistory = [];
                currentUser.rewardHistory.push({ level:currentReward.level, name:currentReward.name, reward:currentReward.reward, date:new Date().toISOString() });
                await saveUser();

            const amounts=[200,400,600,1000,2000,3000,5000,8000,12000,16000,20000,30000]; 
            let html='<h3 style="color:#FFD700;">💸 Sacar</h3><div style="text-align:center;color:'+(wi.allowed?'#10B981':'#FF4757')+';">'+wi.text+'</div>'; 
            html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;">'; 
            amounts.forEach(a=>{html+='<div onclick="'+(wi.allowed?'requestWithdrawal('+a+')':'')+'" class="saque-amount-btn'+(wi.allowed?'':' disabled')+'">'+a.toLocaleString()+' MT</div>';}); 
            html+='</div>'; document.getElementById('mainContent').innerHTML=html; 
        }
        
        async function requestWithdrawal(a){const wi=getWithdrawInfo();if(!wi.allowed)return;const fee=Math.round(a*0.1),net=a-fee;if((currentUser.balance||0)<a){alert('Saldo insuficiente!');return;}if(confirm('💸 Sacar '+a.toLocaleString()+' MT?\nTaxa: '+fee.toLocaleString()+' MT\nLíquido: '+net.toLocaleString()+' MT')){currentUser.balance-=a;currentUser.lastWithdrawDate=new Date().toISOString();await db.ref('saques/saq_'+Date.now()).set({name:currentUser.name,phone:currentUser.phone,amount:a,fee,netAmount:net,date:new Date().toISOString(),status:'pending'});await saveUser();alert('✅ Saque solicitado!');showTab('home');}}
        
        function showDepositModal(){const o=document.createElement('div');o.className='modal-overlay';o.innerHTML='<div class="modal-box"><h3 style="color:#FFD700;">💰 Depositar</h3><div class="perfil-row">📱 Emola: <strong>'+(configCache.emolaNumber||'851511841')+'</strong></div><div class="perfil-row">📱 M-Pesa: <strong>'+(configCache.mpesaNumber||'870514180')+'</strong></div><hr style="border-color:rgba(255,215,0,0.2);"><label class="deposit-label">👤 Nome:</label><input type="text" id="depName" class="deposit-input" value="'+(currentUser.name||'')+'"><label class="deposit-label">📱 Número:</label><input type="text" id="depPhone" class="deposit-input" value="'+(currentUser.phone||'')+'"><label class="deposit-label">💰 Valor (MT):</label><input type="number" id="depAmount" class="deposit-input" placeholder="Mínimo 200 MT"><button onclick="submitDeposit()" class="btn-primary">💾 ENVIAR</button><button onclick="this.closest(\'.modal-overlay\').remove()" class="btn-outline">Cancelar</button></div>';document.body.appendChild(o);}
        
        async function submitDeposit(){const name=document.getElementById('depName')?.value?.trim(),phone=document.getElementById('depPhone')?.value?.trim(),amount=Number(document.getElementById('depAmount')?.value);if(!name||!phone||!amount||amount<200){alert('⚠️ Preencha todos os campos! Mín 200 MT');return;}await addDeposit({name,phone,userPhone:currentUser.phone,amount,date:new Date().toISOString(),status:'pending'});document.querySelector('.modal-overlay')?.remove();alert('✅ Depósito registrado!');}

        // ==================== FUNDOS ====================
        function showFundModal(level){const f=fundLevels.find(x=>x.level===level);if(!f)return;const o=document.createElement('div');o.className='modal-overlay';o.innerHTML='<div class="modal-box"><h3 style="color:#FFD700;">📈 '+f.name+'</h3><div style="color:white;">💰 Mín: '+f.minPrice.toLocaleString()+' MT | Base: '+f.basePrice.toLocaleString()+' MT</div><div style="color:white;">💵 Retorno: '+f.baseTotal.toLocaleString()+' MT | '+f.days+' dias | '+f.basePercent+'%</div><input type="range" id="fundSlider" min="'+f.minPrice+'" max="'+(f.basePrice*2)+'" value="'+f.basePrice+'" step="100" oninput="updateFundCalc('+f.level+',this.value)" style="width:100%;margin:10px 0;"><div style="background:rgba(0,0,0,0.3);padding:15px;border-radius:10px;"><div style="color:white;">💰 <strong id="fundInvValue">'+f.basePrice.toLocaleString()+' MT</strong></div><div style="color:#10B981;">📈 <strong id="fundPercent">'+f.basePercent+'%</strong></div><div style="color:#FFD700;">💵 <strong id="fundReturn">'+f.baseTotal.toLocaleString()+' MT</strong></div></div><button onclick="confirmFundInvestment('+f.level+')" class="btn-primary">💸 INVESTIR</button><button onclick="this.closest(\'.modal-overlay\').remove()" class="btn-outline">Cancelar</button></div>';document.body.appendChild(o);}
        
        function updateFundCalc(level,value){const f=fundLevels.find(x=>x.level===level);if(!f)return;const iv=Number(value),ratio=iv/f.basePrice,pct=Math.round(f.basePercent*ratio),rv=Math.round(iv*(1+pct/100));document.getElementById('fundInvValue').textContent=iv.toLocaleString()+' MT';document.getElementById('fundPercent').textContent=pct+'%';document.getElementById('fundReturn').textContent=rv.toLocaleString()+' MT';}
        
        async function confirmFundInvestment(level){const f=fundLevels.find(x=>x.level===level);if(!f)return;const iv=Number(document.getElementById('fundSlider').value);if((currentUser.balance||0)<iv){alert('Saldo insuficiente!');return;}const rv=Math.round(iv*(1+f.basePercent/100));if(confirm('Investir '+iv.toLocaleString()+' MT?\nRetorno: '+rv.toLocaleString()+' MT\n'+f.days+' dias')){currentUser.balance-=iv;if(!currentUser.fundLevels)currentUser.fundLevels=[];currentUser.fundLevels.push({level:f.level,amount:iv,returnValue:rv});await saveUser();setTimeout(async()=>{const u=await getUser(currentUser.phone);if(u?.fundLevels?.some(fl=>fl.level===f.level)){u.balance=(u.balance||0)+rv;u.fundLevels=u.fundLevels.filter(fl=>fl.level!==f.level);if(!u.fundHistory)u.fundHistory=[];u.fundHistory.push({amount:iv,returnValue:rv,date:new Date().toISOString(),fund:f.name});currentUser=u;await saveUser();alert('🎉 '+f.name+'! +'+rv.toLocaleString()+' MT');}},f.days*86400000);document.querySelector('.modal-overlay')?.remove();alert('✅ Investido!');showTab('fundos');}}

        // ==================== TIMER ====================
        async function startTimer(){const el=document.getElementById('taskTimer');if(!el)return;const upd=async()=>{const st=await getServerTime(),n=new Date(st),end=new Date(n);end.setHours(23,59,59,999);const diff=end-n;el.textContent=diff<=0?'24:00:00':String(Math.floor(diff/3600000)).padStart(2,'0')+':'+String(Math.floor((diff%3600000)/60000)).padStart(2,'0')+':'+String(Math.floor((diff%60000)/1000)).padStart(2,'0');setTimeout(upd,1000);};upd();}

        // ==================== ADMIN PANEL ====================
        async function getPendingCounts(){const ds=await db.ref('depositos').once('value'),deps=ds.exists()?ds.val():{};const pd=Object.values(deps).filter(d=>d?.status==='pending').length;const ss=await db.ref('saques').once('value'),saqs=ss.exists()?ss.val():{};const ps=Object.values(saqs).filter(s=>s?.status==='pending').length;return{pendingDeposits:pd,pendingSaques:ps};}
        
        async function showAdminPanel(){
            if(adminPanelOpen)return;adminPanelOpen=true;
            const c=await getPendingCounts();
            const p=document.createElement('div');p.className='admin-panel';p.id='adminPanel';
            p.innerHTML='<div style="display:flex;justify-content:space-between;"><h2 style="color:#FFD700;">🔧 Admin GENINS</h2><button onclick="closeAdminPanel()" class="admin-btn admin-btn-danger">❌ Fechar</button></div>'+
                '<div class="admin-section"><h4 style="color:#FFD700;">🔘 Saques Diários</h4><label class="toggle-switch"><input type="checkbox" id="dailyToggle" '+(withdrawSettings.dailyActive?'checked':'')+' onchange="toggleDailyWithdrawals()"><span class="toggle-slider"></span></label><span id="dailyStatus" style="color:#FFD700;">'+(withdrawSettings.dailyActive?'🟢 LIGADO':'🔴 DESLIGADO')+'</span></div>'+
                '<div class="admin-section"><h4 style="color:#FFD700;">🔍 Pesquisar Usuário</h4><input id="adminSearchUser" class="admin-input" placeholder="Número do usuário"><button onclick="adminSearchUser()" class="admin-btn admin-btn-primary" style="width:100%;margin-top:4px;">🔍 PESQUISAR</button><div id="adminUserResult" style="margin-top:8px;"></div></div>'+
                '<div class="admin-section"><h4 style="color:#FFD700;">💳 Pagamentos</h4><input id="adminEmola" value="'+(configCache.emolaNumber||'')+'" placeholder="Emola" class="admin-input"><input id="adminMpesa" value="'+(configCache.mpesaNumber||'')+'" placeholder="M-Pesa" class="admin-input"><button onclick="adminSavePayments()" class="admin-btn admin-btn-primary">💾 SALVAR</button></div>'+
                '<div class="admin-section"><h4 style="color:#FFD700;">📱 Links</h4><input id="adminWhatsapp" value="'+(configCache.whatsappNumber||'')+'" placeholder="WhatsApp" class="admin-input"><input id="adminWhatsappGroup" value="'+(configCache.whatsappGroupLink||'')+'" placeholder="Link Grupo WhatsApp" class="admin-input"><input id="adminTelegram" value="'+(configCache.telegramLink||'')+'" placeholder="Telegram" class="admin-input"><input id="adminYoutube" value="'+(configCache.youtubeLink||'')+'" placeholder="YouTube" class="admin-input"><button onclick="adminSaveLinks()" class="admin-btn admin-btn-primary">💾 SALVAR</button></div>'+
                '<div class="admin-section"><h4 style="color:#FFD700;">📖 Editar Sobre Nós</h4><div id="adminArtigosList" style="max-height:300px;overflow-y:auto;"></div><button onclick="adminAddArtigo()" class="admin-btn admin-btn-primary" style="width:100%;margin-top:4px;">➕ Adicionar Artigo</button><button onclick="adminSaveArtigos()" class="admin-btn admin-btn-warn" style="width:100%;margin-top:4px;">💾 Salvar Artigos</button></div>'+
                '<button onclick="adminDepositsList()" class="admin-btn admin-btn-outline">💰 Depósitos <span class="badge-notification">'+c.pendingDeposits+'</span></button>'+
                '<button onclick="adminWithdrawalsList()" class="admin-btn admin-btn-outline">💸 Saques <span class="badge-notification">'+c.pendingSaques+'</span></button>'+
                '<div id="adminContent"></div>';
            document.body.appendChild(p);document.getElementById('appScreen').style.display='none';
            adminRenderArtigos();
        }
        
        function closeAdminPanel(){document.getElementById('adminPanel')?.remove();adminPanelOpen=false;document.getElementById('appScreen').style.display='flex';}
        async function toggleDailyWithdrawals(){withdrawSettings.dailyActive=!withdrawSettings.dailyActive;document.getElementById('dailyStatus').innerHTML=withdrawSettings.dailyActive?'🟢 LIGADO':'🔴 DESLIGADO';await db.ref('admin/withdrawSettings').set(withdrawSettings);}
        
        // Admin - Pesquisar/Editar Usuário
        async function adminSearchUser(){
            const phone=document.getElementById('adminSearchUser')?.value?.trim();
            if(!phone){alert('Digite um número!');return;}
            const user=await getUser(phone);
            const div=document.getElementById('adminUserResult');
            if(!user){div.innerHTML='<div style="color:#FF4757;padding:12px;">❌ Usuário não encontrado</div>';return;}
            div.innerHTML='<div style="background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:14px;">'+
                '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><strong style="color:#FFD700;">👤 '+(user.name||'N/A')+'</strong><span style="color:#aaa;">📱 '+phone+'</span></div>'+
                '<div style="color:#aaa;font-size:12px;">🔑 Senha: '+(user.password||'****')+'</div>'+
                '<div style="color:#aaa;font-size:12px;">💰 Saldo: '+(user.balance||0).toLocaleString()+' MT</div>'+
                '<div style="color:#aaa;font-size:12px;">💎 VIP: '+(user.vipType==='estagiario'?'Estagiário':(user.vip||'Free'))+'</div>'+
                '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">'+
                '<button onclick="adminChangeBalance(\''+phone+'\','+(user.balance||0)+')" class="admin-btn admin-btn-success">💰 Mudar Saldo</button>'+
                '<button onclick="adminResetPassword(\''+phone+'\')" class="admin-btn admin-btn-warn">🔑 Redefinir Senha</button>'+
                '<button onclick="adminDeleteUser(\''+phone+'\',\''+(user.name||'N/A').replace(/'/g,"\\\\\'")+'\')" class="admin-btn admin-btn-danger">🗑️ Excluir</button>'+
                '</div></div>';
        }
        
        async function adminChangeBalance(phone,curr){const nb=prompt('💰 Saldo atual: '+(curr||0).toLocaleString()+' MT\n\nNovo saldo:');if(nb===null)return;const a=parseFloat(nb);if(isNaN(a)||a<0){alert('Inválido!');return;}if(!confirm('Confirmar?\n📱 '+phone+'\n💰 '+a.toLocaleString()+' MT'))return;await updateUser(phone,{balance:a});if(currentUser?.phone===phone){currentUser.balance=a;updateBalanceDisplay();}alert('✅ Atualizado!');adminSearchUser();}
        
        async function adminResetPassword(phone){const np=prompt('🔑 Nova senha para '+phone+':');if(!np||np.length<4){alert('Mín 4 caracteres!');return;}if(!confirm('Confirmar?\n📱 '+phone+'\n🔑 '+np))return;await updateUser(phone,{password:np});alert('✅ Redefinida!');adminSearchUser();}
        
        async function adminDeleteUser(phone,name){if(!confirm('⚠️ EXCLUIR?\n👤 '+decodeURIComponent(name)+'\n📱 '+phone+'\n\nIRREVERSÍVEL!'))return;if(!confirm('⚠️ ÚLTIMA CONFIRMAÇÃO!'))return;await deleteUserFB(phone);document.getElementById('adminUserResult').innerHTML='<div style="color:#10B981;padding:12px;">✅ Excluído!</div>';}
        
        async function adminSavePayments(){configCache.emolaNumber=document.getElementById('adminEmola')?.value;configCache.mpesaNumber=document.getElementById('adminMpesa')?.value;await setConfig(configCache);alert('✅ Salvo!');}
        
        async function adminSaveLinks(){configCache.whatsappNumber=document.getElementById('adminWhatsapp')?.value;configCache.whatsappGroupLink=document.getElementById('adminWhatsappGroup')?.value;configCache.telegramLink=document.getElementById('adminTelegram')?.value;configCache.youtubeLink=document.getElementById('adminYoutube')?.value;await setConfig(configCache);alert('✅ Salvo!');}
        
        // Admin - Artigos
        function adminRenderArtigos(){const div=document.getElementById('adminArtigosList');if(!div)return;div.innerHTML=artigosSobreNos.map((a,i)=>'<div style="background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:10px;margin:4px 0;"><input value="'+a.titulo.replace(/"/g,'&quot;')+'" onchange="artigosSobreNos['+i+'].titulo=this.value" class="admin-input" placeholder="Título" style="margin-bottom:4px;"><textarea onchange="artigosSobreNos['+i+'].conteudo=this.value" class="admin-input" rows="2" style="resize:vertical;">'+a.conteudo+'</textarea><button onclick="artigosSobreNos.splice('+i+',1);adminRenderArtigos()" class="admin-btn admin-btn-danger" style="margin-top:4px;font-size:10px;">🗑️ Remover</button></div>').join('');}
        
        function adminAddArtigo(){artigosSobreNos.push({titulo:'Novo Artigo',conteudo:'Conteúdo...'});adminRenderArtigos();}
        
        async function adminSaveArtigos(){await db.ref('configuracoes/artigosSobreNos').set(artigosSobreNos);alert('✅ Artigos salvos!');}
        
        // Admin - Depósitos
        async function adminDepositsList(){const deps=await getDeposits();const pend=Object.entries(deps).filter(([k,d])=>d?.status==='pending');let html='<div class="admin-section"><h4 style="color:#FFD700;">💰 Depósitos Pendentes ('+pend.length+')</h4>';html+=pend.length?pend.map(([k,d])=>'<div style="background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:10px;margin:4px 0;"><div style="display:flex;justify-content:space-between;"><span>👤 '+(d.name||'N/A')+'</span><span style="color:#10B981;">'+(d.amount||0).toLocaleString()+' MT</span></div><div style="display:flex;gap:6px;margin-top:6px;"><button onclick="adminApproveDeposit(\''+k+'\')" class="admin-btn admin-btn-success">✅ Aprovar</button><button onclick="adminRejectDeposit(\''+k+'\')" class="admin-btn admin-btn-danger">❌ Recusar</button></div></div>').join(''):'<div style="color:white;">✅ Nenhum pendente</div>';html+='</div>';document.getElementById('adminContent').innerHTML=html;}
        
        async function adminApproveDeposit(key){const r=db.ref('depositos/'+key),s=await r.once('value');if(!s.exists())return;const d=s.val();if(!confirm('✅ APROVAR?\n👤 '+(d.name||'N/A')+'\n💰 '+(d.amount||0).toLocaleString()))return;await r.update({status:'approved',approvedAt:new Date().toISOString()});const u=await getUser(d.userPhone||d.phone);if(u){u.balance=(u.balance||0)+(d.amount||0);if(!u.depositHistory)u.depositHistory=[];u.depositHistory.push({amount:d.amount,date:new Date().toISOString()});await setUser(d.userPhone||d.phone,u);if(currentUser?.phone===(d.userPhone||d.phone)){currentUser.balance=u.balance;updateBalanceDisplay();}}alert('✅ Aprovado!');adminDepositsList();}
        
        async function adminRejectDeposit(key){if(!confirm('❌ RECUSAR?'))return;await db.ref('depositos/'+key).update({status:'rejected'});alert('❌ Recusado!');adminDepositsList();}
        
        async function adminWithdrawalsList(){const snap=await db.ref('saques').once('value'),saques=snap.exists()?snap.val():{},pend=Object.entries(saques).filter(([k,s])=>s?.status==='pending');let html='<div class="admin-section"><h4 style="color:#FFD700;">💸 Saques Pendentes ('+pend.length+')</h4>';html+=pend.length?pend.map(([k,s])=>'<div style="background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:10px;margin:4px 0;"><div style="display:flex;justify-content:space-between;"><span>👤 '+(s.name||'N/A')+'</span><span style="color:#10B981;">'+(s.netAmount||0).toLocaleString()+' MT</span></div><div style="display:flex;gap:6px;margin-top:6px;"><button onclick="adminApproveWithdrawal(\''+k+'\')" class="admin-btn admin-btn-success">✅ Pagar</button><button onclick="adminRejectWithdrawal(\''+k+'\')" class="admin-btn admin-btn-danger">❌ Recusar</button></div></div>').join(''):'<div style="color:white;">✅ Nenhum pendente</div>';html+='</div>';document.getElementById('adminContent').innerHTML=html;}
        
        async function adminApproveWithdrawal(key){const r=db.ref('saques/'+key),s=await r.once('value');if(!s.exists())return;const d=s.val();if(!confirm('✅ PAGAR?\n💵 '+(d.netAmount||0).toLocaleString()))return;await r.update({status:'approved'});alert('✅ Pago!');adminWithdrawalsList();}
        
        async function adminRejectWithdrawal(key){const r=db.ref('saques/'+key),s=await r.once('value');if(!s.exists())return;const d=s.val();if(!confirm('❌ RECUSAR?\n💰 Devolver '+(d.amount||0).toLocaleString()+' MT?'))return;const u=await getUser(d.phone);if(u){u.balance=(u.balance||0)+(d.amount||0);await setUser(d.phone,u);}await r.update({status:'rejected'});alert('❌ Recusado!');adminWithdrawalsList();}

        // ==================== PWA ====================
        let deferredPrompt=null;
        window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installButton')?.classList.remove('hidden');});
        async function installApp(){if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted'){document.getElementById('installButton')?.classList.add('hidden');alert('✅ App instalado!');}deferredPrompt=null;}else{alert('📲 Use "Adicionar à tela inicial"');}}
        window.addEventListener('appinstalled',()=>{document.getElementById('installButton')?.classList.add('hidden');});
        if(window.matchMedia('(display-mode:standalone)').matches){document.getElementById('installButton')?.classList.add('hidden');}

        // ==================== INIT ====================
        async function init(){
            const pc=document.getElementById('particles');
            const pclasses=['particle-gold','particle-diamond','particle-ruby'];
            for(let i=0;i<25;i++){const p=document.createElement('div');p.className='particle '+pclasses[Math.floor(Math.random()*3)];p.style.width=p.style.height=(Math.random()*6+2)+'px';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*15+'s';p.style.animationDuration=(Math.random()*10+8)+'s';pc.appendChild(p);}
            await getConfig();
            const artigosSalvos=await db.ref('configuracoes/artigosSobreNos').once('value');
            if(artigosSalvos.exists())artigosSobreNos=artigosSalvos.val();
            await db.ref('admin/senha').set(ADMIN_PASSWORD);
            await db.ref('admin/withdrawSettings').once('value').then(s=>{if(s.exists())withdrawSettings=s.val();});
            await setConfig(configCache);
            setTimeout(checkReferralFromUrl,300);
        }
        document.addEventListener('contextmenu',e=>e.preventDefault());
        init();
    </script>
</body>
</html>
