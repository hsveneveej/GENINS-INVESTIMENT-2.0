        function getWithdrawInfo() { if(currentUser.vipType==='estagiario')return{allowed:false,text:'🔒 Faça upgrade para VIP (mín 200 MT) para sacar!',isEstagiario:true,canView:true};if(!currentUser.vip||currentUser.vip===0)return{allowed:false,text:'🔒 Ative um VIP (mín 200 MT) para sacar!',canView:true};const today=new Date().getDay();if(withdrawSettings.dailyActive){if(currentUser.lastWithdrawDate){const lastSaque=new Date(currentUser.lastWithdrawDate).getTime();const agora=Date.now();const diffHoras=(agora-lastSaque)/(1000*60*60);if(diffHoras<24){const remaining=24*60*60*1000-(agora-lastSaque);const hrs=Math.floor(remaining/3600000);const mins=Math.floor((remaining%3600000)/60000);const secs=Math.floor((remaining%60000)/1000);return{allowed:false,text:'⏳ '+String(hrs).padStart(2,'0')+':'+String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0'),cooldownRemaining:remaining,canView:true};}}if(today===0)return{allowed:false,text:'🔒 Domingo',canView:true};if(today===6)return{allowed:false,text:'📋 Sábado',canView:true};return{allowed:true,text:'✅ Disponível - Saque Diário',canView:true};}if(today===0||today===6)return{allowed:false,text:today===0?'🔒 Domingo':'📋 Sábado',canView:true};let vd=vipLevels.find(v=>v.level===currentUser.vip&&v.type==='normal');if(!vd)return{allowed:false,text:'❌ VIP não encontrado',canView:true};const diasSemana=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];if(!vd.withdrawDays.includes(today))return{allowed:false,text:'⏳ Seu dia: '+vd.withdrawDays.map(d=>diasSemana[d]).join(', '),canView:true};return{allowed:true,text:'✅ '+vd.name+' - Disponível',canView:true}; }

        function calculateGains(period) { if(!currentUser)return 0;const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());let sd;switch(period){case'today':sd=today;break;case'yesterday':sd=new Date(today);sd.setDate(sd.getDate()-1);break;case'month':sd=new Date(now.getFullYear(),now.getMonth(),1);break;case'2years':sd=new Date(now.getFullYear()-2,now.getMonth(),now.getDate());break;default:return 0;}const ed=period==='yesterday'?today:now;let tot=0;['depositHistory','vipEarningsHistory','taskHistory','commissionHistory'].forEach(h=>{if(currentUser[h])currentUser[h].forEach(it=>{if(it.date){const d=new Date(it.date);if(d>=sd&&d<=ed)tot+=(it.amount||0);}});});if(currentUser.fundHistory)currentUser.fundHistory.forEach(f=>{if(f.date){const d=new Date(f.date);if(d>=sd&&d<=ed)tot+=((f.returnValue||0)-(f.amount||0));}});return tot; }

        async function toggleDailyWithdrawals(){withdrawSettings.dailyActive=!withdrawSettings.dailyActive;document.getElementById('dailyStatus').innerHTML=withdrawSettings.dailyActive?'🟢 LIGADO':'🔴 DESLIGADO';await db.ref('admin/withdrawSettings').set(withdrawSettings);}
        async function adminSearchUser(){const p=document.getElementById('adminSearchUser')?.value?.trim();if(!p)return;const u=await getUser(p);const d=document.getElementById('adminUserResult');if(!u){d.innerHTML='<div style="color:#FF4757;">❌ Não encontrado</div>';return;}d.innerHTML='<div style="background:rgba(0,0,0,0.5);padding:14px;border-radius:10px;"><strong style="color:#FFD700;">👤 '+(u.name||'N/A')+'</strong> 📱'+p+'<br>💰 '+(u.balance||0).toLocaleString()+' MT | 💎 '+(u.vipType==='estagiario'?'Estagiário':(u.vip||'Free'))+'<br><button onclick="adminChangeBalance(\''+p+'\','+(u.balance||0)+')" class="admin-btn admin-btn-success">💰</button><button onclick="adminResetPassword(\''+p+'\')" class="admin-btn admin-btn-warn">🔑</button><button onclick="adminDeleteUser(\''+p+'\')" class="admin-btn admin-btn-danger">🗑️</button></div>';}
        async function adminChangeBalance(p,c){const nb=prompt('Novo saldo:');if(nb===null)return;const a=parseFloat(nb);if(isNaN(a)||a<0)return;await updateUser(p,{balance:a});if(currentUser?.phone===p){currentUser.balance=a;updateBalanceDisplay();}alert('✅');adminSearchUser();}
        async function adminResetPassword(p){const np=prompt('Nova senha:');if(!np||np.length<4)return;await updateUser(p,{password:np});alert('✅');}
        async function adminDeleteUser(p){if(confirm('⚠️ EXCLUIR?')){await deleteUserFB(p);document.getElementById('adminUserResult').innerHTML='<div style="color:#10B981;">✅ Excluído!</div>';}}
        async function adminSavePayments(){configCache.emolaNumber=document.getElementById('adminEmola')?.value;configCache.mpesaNumber=document.getElementById('adminMpesa')?.value;await setConfig(configCache);alert('✅');}
        async function adminSaveLinks(){configCache.whatsappNumber=document.getElementById('adminWhatsapp')?.value;configCache.whatsappGroupLink=document.getElementById('adminWhatsappGroup')?.value;configCache.telegramLink=document.getElementById('adminTelegram')?.value;configCache.youtubeLink=document.getElementById('adminYoutube')?.value;await setConfig(configCache);alert('✅');}
        function adminRenderArtigos(){const d=document.getElementById('adminArtigosList');if(!d)return;d.innerHTML=artigosSobreNos.map((a,i)=>'<div style="background:rgba(0,0,0,0.5);padding:10px;margin:4px 0;border-radius:8px;"><input value="'+a.titulo.replace(/"/g,'&quot;')+'" onchange="artigosSobreNos['+i+'].titulo=this.value" class="admin-input"><textarea onchange="artigosSobreNos['+i+'].conteudo=this.value" class="admin-input" rows="2">'+a.conteudo+'</textarea><button onclick="artigosSobreNos.splice('+i+',1);adminRenderArtigos()" class="admin-btn admin-btn-danger" style="font-size:10px;">🗑️</button></div>').join('');}
        function adminAddArtigo(){artigosSobreNos.push({titulo:'Novo',conteudo:'...'});adminRenderArtigos();}
        async function adminSaveArtigos(){await db.ref('configuracoes/artigosSobreNos').set(artigosSobreNos);alert('✅');}
        async function adminDepositsList(){const d=await getDeposits();const p=Object.entries(d).filter(([k,v])=>v?.status==='pending');document.getElementById('adminContent').innerHTML='<div class="admin-section"><h4>💰 Pendentes ('+p.length+')</h4>'+p.map(([k,v])=>'<div style="background:rgba(0,0,0,0.5);padding:10px;margin:4px 0;"><span>👤 '+(v.name||'N/A')+'</span> <span style="color:#10B981;">'+(v.amount||0).toLocaleString()+' MT</span><br><button onclick="adminApproveDeposit(\''+k+'\')" class="admin-btn admin-btn-success">✅</button><button onclick="adminRejectDeposit(\''+k+'\')" class="admin-btn admin-btn-danger">❌</button></div>').join('')+'</div>';}
        async function adminApproveDeposit(k){const r=db.ref('depositos/'+k),s=await r.once('value');if(!s.exists())return;const d=s.val();await r.update({status:'approved',approvedAt:new Date().toISOString()});const u=await getUser(d.userPhone||d.phone);if(u){u.balance=(u.balance||0)+(d.amount||0);if(!u.depositHistory)u.depositHistory=[];u.depositHistory.push({amount:d.amount,date:new Date().toISOString()});await setUser(d.userPhone||d.phone,u);}alert('✅');adminDepositsList();}
        async function adminRejectDeposit(k){await db.ref('depositos/'+k).update({status:'rejected'});alert('❌');adminDepositsList();}
        async function adminWithdrawalsList(){const s=await db.ref('saques').once('value'),v=s.exists()?s.val():{},p=Object.entries(v).filter(([k,x])=>x?.status==='pending');document.getElementById('adminContent').innerHTML='<div class="admin-section"><h4>💸 Pendentes ('+p.length+')</h4>'+p.map(([k,x])=>'<div style="background:rgba(0,0,0,0.5);padding:10px;margin:4px 0;"><span>👤 '+(x.name||'N/A')+'</span> <span style="color:#10B981;">'+(x.netAmount||0).toLocaleString()+' MT</span><br><button onclick="adminApproveWithdrawal(\''+k+'\')" class="admin-btn admin-btn-success">✅</button><button onclick="adminRejectWithdrawal(\''+k+'\')" class="admin-btn admin-btn-danger">❌</button></div>').join('')+'</div>';}
        async function adminApproveWithdrawal(k){const r=db.ref('saques/'+k);await r.update({status:'approved'});alert('✅');adminWithdrawalsList();}
        async function adminRejectWithdrawal(k){const r=db.ref('saques/'+k),s=await r.once('value');if(!s.exists())return;const d=s.val();const u=await getUser(d.phone);if(u){u.balance=(u.balance||0)+(d.amount||0);await setUser(d.phone,u);}await r.update({status:'rejected'});alert('❌');adminWithdrawalsList();}

        let usuariosScrollState = { pagina: 1, carregando: false, temMais: true, todosUsuarios: {} };
        async function adminUsersList() {
            const c=document.getElementById('adminContent');usuariosScrollState={pagina:1,carregando:false,temMais:true,todosUsuarios:{}};
            const all=await getAllUsers();usuariosScrollState.todosUsuarios=all;
            c.innerHTML='<div class="admin-section"><h4>👥 TOP VIPs</h4><div class="usuarios-list-container"><div class="usuarios-list-header" style="grid-template-columns: 2fr 2fr 1.5fr 1fr;"><span>📱 Nº Celular</span><span>👤 Nome</span><span>🔒 Senha VIP</span><span>💰 Valor</span></div><div class="usuarios-scroll" id="usuariosScroll" onscroll="adminScrollUsuarios()"><div class="loading-admin"><div class="spinner-admin"></div></div></div></div></div>';
            setTimeout(()=>adminCarregarUsuarios(true),100);
        }
        async function adminCarregarUsuarios(r=false){
            if(usuariosScrollState.carregando)return;usuariosScrollState.carregando=true;
            if(r){usuariosScrollState.pagina=1;usuariosScrollState.temMais=true;document.getElementById('usuariosScroll').innerHTML='';}
            const pp=20,ini=(usuariosScrollState.pagina-1)*pp;
            const all=usuariosScrollState.todosUsuarios;
            let filt=Object.entries(all);
            filt.sort((a,b)=>{
                const getVipValue=(user)=>{if(!user.vip||user.vip===0)return 0;const vipInfo=vipLevels.find(v=>v.level===user.vip&&v.type==='normal');return vipInfo?vipInfo.price:0;};
                return getVipValue(b[1])-getVipValue(a[1]);
            });
            const pag=filt.slice(ini,ini+pp);
            if(pag.length){
                let h='';
                pag.forEach(([phone,user],i)=>{
                    const posicaoGlobal=ini+i+1;
                    let rowStyle='',medalha='';
                    if(posicaoGlobal===1){rowStyle='background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; font-weight: bold;';medalha='🥇 ';}
                    else if(posicaoGlobal===2){rowStyle='background: linear-gradient(45deg, #C0C0C0, #E8E8E8); color: #000; font-weight: bold;';medalha='🥈 ';}
                    else if(posicaoGlobal===3){rowStyle='background: linear-gradient(45deg, #CD7F32, #D2691E); color: #fff; font-weight: bold;';medalha='🥉 ';}
                    const senhaVIP=user.password||'****';
                    let valorVIP=0;
                    if(user.vip>0&&user.vipType!=='estagiario'){const vipInfo=vipLevels.find(v=>v.level===user.vip&&v.type==='normal');valorVIP=vipInfo?vipInfo.price:0;}
                    const valorFormatado=valorVIP.toLocaleString('pt-MZ',{minimumFractionDigits:2})+' MT';
                    h+='<div class="usuario-row-item" style="grid-template-columns: 2fr 2fr 1.5fr 1fr; '+rowStyle+'">';
                    h+='<span>'+medalha+phone+'</span>';
                    h+='<span>'+(user.name||'N/A')+'</span>';
                    h+='<span>'+senhaVIP+'</span>';
                    h+='<span style="color: #10B981; font-weight: 700;">'+valorFormatado+'</span>';
                    h+='</div>';
                });
                document.getElementById('usuariosScroll').insertAdjacentHTML('beforeend',h);
                usuariosScrollState.pagina++;usuariosScrollState.temMais=ini+pp<filt.length;
            }else{usuariosScrollState.temMais=false;}
            usuariosScrollState.carregando=false;
        }
        function adminScrollUsuarios(){const d=document.getElementById('usuariosScroll');if(!d||usuariosScrollState.carregando||!usuariosScrollState.temMais)return;if(d.scrollTop+d.clientHeight>=d.scrollHeight-100)adminCarregarUsuarios(false);}

        let deferredPrompt=null;
        window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installButton')?.classList.remove('hidden');});
        async function installApp(){if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted'){document.getElementById('installButton')?.classList.add('hidden');}deferredPrompt=null;}}
        window.addEventListener('appinstalled',()=>{document.getElementById('installButton')?.classList.add('hidden');});
        if(window.matchMedia('(display-mode:standalone)').matches){document.getElementById('installButton')?.classList.add('hidden');}
        async function init(){
            const pc=document.getElementById('particles');
            for(let i=0;i<25;i++){const p=document.createElement('div');p.className='particle '+['particle-gold','particle-diamond','particle-ruby'][Math.floor(Math.random()*3)];p.style.width=p.style.height=(Math.random()*6+2)+'px';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*15+'s';p.style.animationDuration=(Math.random()*10+8)+'s';pc.appendChild(p);}
            await getConfig();
            const as=await db.ref('configuracoes/artigosSobreNos').once('value');if(as.exists())artigosSobreNos=as.val();
            await db.ref('admin/senha').set(ADMIN_PASSWORD);
            await db.ref('admin/withdrawSettings').once('value').then(s=>{if(s.exists())withdrawSettings=s.val();});
            await setConfig(configCache);
            setTimeout(checkReferralFromUrl,300);
            startNotificationTicker();
            startOnlineCounter();
        }
        document.addEventListener('contextmenu',e=>e.preventDefault());
        init();
    </script>
